name = "nt-estate-partners"
main = "worker.js"
account_id = "YOUR_ACCOUNT_ID"
workers_dev = true
route = "ntestatepartners.com/*"
zone_id = "YOUR_ZONE_ID"

[env.production]
route = "ntestatepartners.com/*"
zone_id = "YOUR_ZONE_ID"

# Environment variables and bindings
[env.production.vars]
SEND_FROM = "noreply@ntestatepartners.com"

# For Cloudflare Email Routing (if using native email service)
# [[env.production.bindings]]
# name = "SEND_EMAIL"
# type = "service"
# service = "send-email"

# For SendGrid integration
# [env.production]
# [[env.production.vars]]
# SENDGRID_API_KEY = "YOUR_SENDGRID_API_KEY"

# For Mailgun integration
# [env.production]
# [[env.production.vars]]
# MAILGUN_API_KEY = "YOUR_MAILGUN_API_KEY"
# MAILGUN_DOMAIN = "YOUR_MAILGUN_DOMAIN"

build = { command = "npm install" }

[build.upload]
format = "service-worker"
